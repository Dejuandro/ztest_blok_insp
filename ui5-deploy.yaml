# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: zapp.ztestblokinsp
framework:
  name: SAPUI5
  version: "1.90.7"
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: http://idnipcw21.wcsglobal.id:8000/
          client: '200'
        app:
          name: ZBSP_TEST_INSP
          description: Testing BSP Blok Inspection
          package: ZTEST_FIORI
          transport: W21K903130
        exclude:
          - /test/
